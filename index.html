<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <h1 class="hello" aria-label="Hello World">
      <span class="word word--hello">
        <span class="letter" style="--i:0">H</span>
        <span class="letter" style="--i:1">e</span>
        <span class="letter" style="--i:2">l</span>
        <span class="letter" style="--i:3">l</span>
        <span class="letter" style="--i:4">o</span>
      </span>
      <span class="word word--world">
        <span class="letter" style="--i:5">W</span>
        <span class="letter" style="--i:6">o</span>
        <span class="letter" style="--i:7">r</span>
        <span class="letter" style="--i:8">l</span>
        <span class="letter" style="--i:9">d</span>
      </span>
    </h1>
    <p class="subtitle">welcome to the web</p>
  </main>

  <canvas class="starfield" aria-hidden="true"></canvas>
  <script src="script.js"></script>
</body>
</html>
